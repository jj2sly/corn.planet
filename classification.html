<!DOCTYPE html>
<html>
<head>
    <title>Classification System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>CLASSIFICATION SYSTEM</h1>
    <p>THREAT LEVEL REFERENCE</p>
</header>

<div class="legend">
    <h3>CLASSIFICATION</h3>
    <div id="classList">Loading...</div>
</div>

<a href="index.html" class="backBtn">⬅ BACK TO HOME</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBshT0wE2kjCIPpt1BozZvLlY3kGwWEH90",
    authDomain: "cpo-9af17.firebaseapp.com",
    projectId: "cpo-9af17",
    storageBucket: "cpo-9af17.firebasestorage.app",
    messagingSenderId: "526427336111",
    appId: "1:526427336111:web:8b71369117416ae937d35a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadClassifications() {
    const listDiv = document.getElementById("classList");
    const querySnapshot = await getDocs(collection(db, "classifications"));

    if (querySnapshot.empty) {
        listDiv.innerHTML = "<p>No classifications have been defined yet.</p>";
        return;
    }

    listDiv.innerHTML = "";

    querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const name = data.name || docSnap.id;
        const color = data.color || "#ffd400";
        const description = data.description || "";

        const p = document.createElement("p");
        p.innerHTML = `
            <span class="class" style="background:${color}; color:#000;">${name}</span>
            ${description ? " — " + description : ""}
        `;
        listDiv.appendChild(p);
    });
}

loadClassifications();
</script>

</body>
</html>
